name: ${COMPOSE_PROJECT_NAME:-pipeline-prod}

services:
  frontend:
    build:
      context: ../../frontend
      args:
        VITE_GEO_CDN_BASE_URL: ${VITE_GEO_CDN_BASE_URL:-}
    image: pipeline/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - server-web

  server-web:
    build:
      context: ../../server
    image: pipeline/server-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      PIPELINE_LOG_DIR: ${PIPELINE_LOG_DIR:-/app/logs}
      PIPELINE_SSE_TIMEOUT: ${PIPELINE_SSE_TIMEOUT:-10m}
      PIPELINE_MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-pipeline_management_system}?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      PIPELINE_MYSQL_USERNAME: ${MYSQL_USER:-appuser}
      PIPELINE_MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      PIPELINE_AGENT_BASE_URL: http://server-agent:8000
      PIPELINE_AGENT_INTERNAL_JWT_SECRET: ${AGENT_INTERNAL_JWT_SECRET:?AGENT_INTERNAL_JWT_SECRET is required}
      PIPELINE_AGENT_INTERNAL_JWT_AUDIENCE: pipeline-agent
    volumes:
      - server_web_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      server-agent:
        condition: service_started

  server-agent:
    build:
      context: ../../server-agent
    image: pipeline/server-agent:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      AGENT_ENVIRONMENT: prod
      AGENT_USE_IN_MEMORY_STORE: "false"
      AGENT_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-pipeline_agent}
      AGENT_REDIS_URL: redis://redis:6379/2
      AGENT_QDRANT_URL: http://qdrant:6333
      AGENT_TOOL_BASE_URL: http://server-web:8080/manager
      AGENT_INTERNAL_JWT_SECRET: ${AGENT_INTERNAL_JWT_SECRET:?AGENT_INTERNAL_JWT_SECRET is required}
      AGENT_INTERNAL_JWT_AUDIENCE: pipeline-agent
      AGENT_REQUIRE_INTERNAL_AUTH: ${AGENT_REQUIRE_INTERNAL_AUTH:-true}
      AGENT_LLM_ENABLED: ${AGENT_LLM_ENABLED:-true}
      AGENT_LLM_BASE_URL: ${AGENT_LLM_BASE_URL:-https://api.moonshot.cn/v1}
      AGENT_LLM_MODEL: ${AGENT_LLM_MODEL:-kimi-k2.6}
      AGENT_LLM_TEMPERATURE: ${AGENT_LLM_TEMPERATURE:-1}
      AGENT_LLM_API_KEY: ${AGENT_LLM_API_KEY:?AGENT_LLM_API_KEY is required}
      AGENT_LOG_DIR: ${AGENT_LOG_DIR:-/app/logs}
      AGENT_LOG_FILE: /app/logs/agent.log
    volumes:
      - server_agent_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pipeline_management_system}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-pipeline_agent}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.6
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_data:
  postgres_data:
  redis_data:
  qdrant_data:
  server_web_logs:
  server_agent_logs:
