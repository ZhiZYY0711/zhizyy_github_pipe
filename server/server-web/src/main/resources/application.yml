server:
  port: 8080
  servlet:
    context-path: /manager

spring:
  application:
    name: pipeline-management-web
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mvc:
    async:
      request-timeout: ${PIPELINE_SSE_TIMEOUT:10m}

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    
  # 配置上传文件的最大大小
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis配置
mybatis:
  mapper-locations: classpath:com/gxa/pipe/**/*.xml
  type-aliases-package: com.gxa.pipe.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${PIPELINE_MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}

# PageHelper分页插件配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

performance:
  monitoring-aggregate:
    enabled: ${PIPELINE_MONITORING_AGGREGATE_ENABLED:false}
    refresh-enabled: ${PIPELINE_MONITORING_AGGREGATE_REFRESH_ENABLED:false}
    today-refresh-interval-ms: 600000
    repair-cron: "0 20 3 * * *"
    repair-window-days: 7
  dashboard-read-model:
    summary-cache-ttl-ms: ${PIPELINE_DASHBOARD_SUMMARY_CACHE_TTL_MS:15000}
    tooltip-cache-ttl-ms: ${PIPELINE_DASHBOARD_TOOLTIP_CACHE_TTL_MS:30000}
    refresh-enabled: ${PIPELINE_DASHBOARD_READ_MODEL_REFRESH_ENABLED:true}
    refresh-on-startup: ${PIPELINE_DASHBOARD_READ_MODEL_REFRESH_ON_STARTUP:true}
    refresh-interval-ms: ${PIPELINE_DASHBOARD_READ_MODEL_REFRESH_INTERVAL_MS:600000}
    initial-delay-ms: ${PIPELINE_DASHBOARD_READ_MODEL_INITIAL_DELAY_MS:30000}
    alarm-limit: ${PIPELINE_DASHBOARD_ALARM_LIMIT:5000}
